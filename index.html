      bad: { primary: { name: "Claude", meta: "бесплатно · claude.ai", why: "Если другие давали слишком сложно — попробуй с указанием уровня: «Я [профессия], объясни без жаргона».", link: "https://claude.ai" }, secondary: null, insight: "«Сделай проще», «дай пример из практики», «где используется реально» — три вопроса которые превращают теорию в понимание." },
      exp: { primary: { name: "Claude", meta: "бесплатно · claude.ai", why: "Для глубокого разбора — задавай уточняющие вопросы в диалоге. Claude держит контекст разговора.", link: "https://claude.ai" }, secondary: { name: "Perplexity", meta: "бесплатно · perplexity.ai", why: "Если нужны актуальные источники и свежие данные по теме.", link: "https://perplexity.ai" }, insight: "Метод Фейнмана с Claude: попроси объяснить → объясни своими словами → попроси найти где ошибся." }
    },
    deep: {
      new: { primary: { name: "Claude", meta: "бесплатно · claude.ai", why: "Лучший собеседник для глубокого понимания. Можно строить целые обучающие сессии в диалоге.", link: "https://claude.ai" }, secondary: null, insight: "Не читай — разговаривай. Задавай вопросы, проверяй своё понимание, проси контрпримеры." },
      bad: { primary: { name: "Claude", meta: "бесплатно · claude.ai", why: "Создай системный промпт: «Ты тьютор по [теме]. Моя цель: [цель]. Уровень: [уровень]. Учи шаг за шагом.»", link: "https://claude.ai" }, secondary: null, insight: "Проблема «общих» объяснений решается контекстом твоего уровня и цели. Скажи зачем это нужно." },

    }
  }
};

let answers = [];
let step = 0;

function choose(val) {
  answers[step] = val;
  step++;
  render();
}

function goBack() {
  step--;
  answers.pop();
  render();
}

function restart() {
  answers = [];
  step = 0;
  render();
}

function render() {
  const app = document.getElementById('app');
  if (step < 3) {
    const q = questions[step];
    app.innerHTML = `
      <div class="progress">
        ${[0,1,2].map(i => `<div class="progress-dot ${i < step ? 'done' : i === step ? 'active' : ''}"></div>`).join('')}
      </div>
      ${step > 0 ? `<button class="back-btn" onclick="goBack()">← назад</button>` : ''}
      <div class="step-label">${q.step}</div>
      <div class="question">${q.q}</div>
      <div class="options">
        ${q.options.map(o => `
          <button class="option" onclick="choose('${o.val}')">
            <span class="option-icon">${o.icon}</span>
            <div class="option-body">
              <div class="option-text">${o.text}</div>
              ${o.sub ? `<div class="option-sub">${o.sub}</div>` : ''}
            </div>
          </button>`).join('')}
      </div>`;
  } else {
    const [task, time, exp] = answers;
    const r = results[task]?.[time]?.[exp];
    if (!r) { restart(); return; }
    app.innerHTML = `
      <div class="progress">
        ${[0,1,2].map(() => `<div class="progress-dot done"></div>`).join('')}
      </div>
      <div class="result-label result-anim">Твой инструмент</div>
      <div class="tool-primary result-anim">
        <div class="tool-badge">начни здесь</div>
        <div class="tool-name">${r.primary.name}</div>
        <div class="tool-meta">${r.primary.meta}</div>
        <div class="tool-why">${r.primary.why}</div>
        <a class="tool-link" href="${r.primary.link}" target="_blank">Открыть →</a>
      </div>
      ${r.secondary ? `
      <div class="tool-secondary result-anim">
        <div class="tool-name">${r.secondary.name}</div>
        <div class="tool-meta">${r.secondary.meta}</div>
        <div class="tool-why">${r.secondary.why}</div>
        <a class="tool-link" href="${r.secondary.link}" target="_blank">Открыть →</a>
      </div>` : ''}
      <div class="insight result-anim">
        <div class="insight-label">Совет практика</div>
        <div class="insight-text">${r.insight}</div>
      </div>
      <button class="restart-btn" onclick="restart()">Пройти заново →</button>
    `;
  }
}

render();
</script>
</body>
</html>
